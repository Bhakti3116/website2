<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Mart Grocery</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        header {
            background-color: #2e7d32;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background-color: #388e3c;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .hero {
            background: url('https://images.unsplash.com/photo-1542838132-92c53300491e') no-repeat center/cover;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 32px;
            font-weight: bold;
        }

        .container {
            padding: 20px;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .product {
            background: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .product img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 5px;
        }

        .product h3 {
            margin: 10px 0;
        }

        .product button {
            background-color: #2e7d32;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 5px;
        }

        .product button:hover {
            background-color: #1b5e20;
        }

        footer {
            background-color: #2e7d32;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>Ganesh Mart Grocery</h1>
    <p>Your Daily Needs, Delivered Fresh</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">Contact</a>
</nav>

<div class="hero">
    Fresh & Organic Groceries
</div>

<div class="container">
    <h2>Our Products</h2>
    <div class="products">
        <div class="product">
            <img src="https://images.unsplash.com/photo-1567306226416-28f0efdc88ce">
            <h3>Apples</h3>
            <p>₹120/kg</p>
            <button>Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1582515073490-dcdd4b8c3b3d">
            <h3>Milk</h3>
            <p>₹50/L</p>
            <button>Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1586201375761-83865001e31c">
            <h3>Bread</h3>
            <p>₹40</p>
            <button>Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1604908176997-4311a38a6a4d">
            <h3>Vegetables</h3>
            <p>₹80/kg</p>
            <button>Add to Cart</button>
        </div>
    </div>
</div>

<footer>
    <p>© 2026 Ganesh Mart Grocery | Contact: +91 9689084329</p>
</footer>

</body>
</html>
